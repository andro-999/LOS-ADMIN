<div class="einlagerung-container">
    <div class="header-row">
        <h2>Einlagerungs Aufträge</h2>
        <app-column-settings [columns]="einlagerungColumns" [storageKey]="'einlagerungColumnSettings'"
            (columnsChange)="onColumnsChange($event)" (reset)="resetColumnOrder()">
        </app-column-settings>
    </div>

    <div class="table-container">
        <table>
            <thead cdkDropList cdkDropListOrientation="horizontal" (cdkDropListDropped)="dropColumn($event)">
                <tr>
                    <ng-container *ngFor="let col of einlagerungColumns">
                        <th *ngIf="col.visible" cdkDrag [style.width]="col.width" [style.min-width]="col.width"
                            [style.max-width]="col.width" class="draggable-header">
                            {{ col.label }}
                        </th>
                    </ng-container>
                </tr>
            </thead>
            <tbody>
                <tr *ngIf="isLoadingEinlagerung">
                    <td [attr.colspan]="visibleColumnsCount" class="loading-state">
                        <mat-icon class="spin">sync</mat-icon>
                        <h3>Lade Einlagerungs-Aufgaben...</h3>
                    </td>
                </tr>

                <tr *ngIf="!isLoadingEinlagerung && einlagerungTasks.length === 0">
                    <td [attr.colspan]="visibleColumnsCount" class="empty-state">
                        <mat-icon>inventory</mat-icon>
                        <h3>Keine Einlagerungs-Aufgaben vorhanden</h3>
                    </td>
                </tr>

                <tr *ngFor="let task of einlagerungTasks; let i = index" [class.even]="i % 2 === 0">
                    <ng-container *ngFor="let col of einlagerungColumns">
                        <td *ngIf="col.id === 'nr' && col.visible">{{ i + 1 }}</td>
                        <td *ngIf="col.id === 'entry_number' && col.visible" class="entry-nr">{{ task.entry_number }}
                        </td>
                        <td *ngIf="col.id === 'artikelnummer' && col.visible" class="artikel-nr">{{ task.artikelnummer
                            }}</td>
                        <td *ngIf="col.id === 'abholort' && col.visible">{{ task.abholort }}</td>
                        <td *ngIf="col.id === 'basis_menge' && col.visible">{{ task.basis_menge }}</td>
                        <td *ngIf="col.id === 'lagerist' && col.visible">
                            <select [ngModel]="task.lagerist || ''" (ngModelChange)="assignLagerist(task, $event)"
                                class="lagerist-select">
                                <option value="">Auswählen</option>
                                <option *ngIf="task.lagerist && !isLageristInList(task.lagerist)"
                                    [ngValue]="task.lagerist" class="inactive">
                                    {{ task.lagerist }} (inaktiv)
                                </option>
                                <option *ngFor="let user of availableLageristen" [ngValue]="user.benutzer_id"
                                    [class.inactive]="!user.isActive">
                                    {{ user.benutzer_id + (!user.isActive ? ' (inaktiv)' : '') }}
                                </option>
                            </select>
                        </td>
                    </ng-container>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="info-row">
        <span>Gesamt: {{ einlagerungTasks.length }} Einlagerungs-Aufgaben</span>
        <button (click)="loadEinlagerungTasks()" class="btn-refresh">
            <mat-icon>refresh</mat-icon>
            Aktualisieren
        </button>
    </div>
</div>
