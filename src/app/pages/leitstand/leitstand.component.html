<!-- 0110000101101110011001000111001001101111 -->
<div class="leitstand-container">
    <app-header pageTitle="LEITSTAND"></app-header>

    <!-- Navigation Buttons -->
    <div class="navigation-buttons">
        <div class="nav-block-container">
            <app-nav-block [buttons]="navButtons" [showSearch]="true" [(searchTerm)]="searchTerm"
                [(selectedPriority)]="selectedPriority" [(selectedStatus)]="selectedStatus"
                [availablePriorities]="availablePriorities" (filterChanged)="onFilterChanged()"
                (refreshClicked)="refreshCurrentView()" (clearFilters)="clearFilters()">
            </app-nav-block>
        </div>

        <!-- Suchfeld nur für Kommi Aufträge -->
        <div class="search-container" *ngIf="currentView === 'kommi-auftraege' || currentView === 'kdx-bereinigung'">
            <mat-icon class="search-icon">search</mat-icon>
            <input type="text" [(ngModel)]="searchTerm" (input)="onFilterChanged()" placeholder="Suchen..."
                class="search-input" />

            <select *ngIf="currentView === 'kommi-auftraege'" [(ngModel)]="selectedPriority"
                (change)="onFilterChanged()" class="filter-select">
                <option value="">Alle Prio</option>
                <option *ngFor="let prio of availablePriorities" [value]="prio">Prio {{ prio }}</option>
            </select>

            <select *ngIf="currentView === 'kommi-auftraege'" [(ngModel)]="selectedStatus" (change)="onFilterChanged()"
                class="filter-select">
                <option value="">Alle Status</option>
                <option value="offen">Offen</option>
                <option value="gestartet">Gestartet</option>
                <option value="erledigt">Erledigt</option>
            </select>

            <!-- KDX Reserviert Filter -->
            <select *ngIf="currentView === 'kdx-bereinigung'" [(ngModel)]="kdxReserviertFilter"
                (change)="onKdxFilterChanged()" class="filter-select kdx-filter">
                <option value="">Alle Plätze</option>
                <option value="reserviert">Nur Reserviert</option>
                <option value="frei">Nur Frei</option>
            </select>

            <button (click)="refreshCurrentView()" class="btn-refresh" title="Liste aktualisieren">
                <mat-icon>refresh</mat-icon>
            </button>

            <button *ngIf="searchTerm || selectedPriority || selectedStatus || kdxReserviertFilter"
                (click)="clearFilters()" class="btn-clear">
                <mat-icon>close</mat-icon>
            </button>
        </div>
    </div>

    <div class="content-container">
        <div class="main-content">
            <app-bereich-nav [items]="bereichNavItems" [currentView]="currentView"
                (viewChanged)="navigateToView($any($event))">
            </app-bereich-nav>

            <!-- Kommi Aufträge -->
            <app-kommi-auftraege *ngIf="currentView === 'kommi-auftraege'" #kommiComponent [searchTerm]="searchTerm"
                [selectedPriority]="selectedPriority" [selectedStatus]="selectedStatus"
                (auftraegeCountChanged)="onAuftraegeCountChanged($event)">
            </app-kommi-auftraege>

            <!-- Einlagerungs Aufträge -->
            <app-einlagerung-auftraege *ngIf="currentView === 'einlagerungsauftraege'" #einlagerungComponent>
            </app-einlagerung-auftraege>

            <!-- Inventur Aufgaben -->
            <app-inventur-aufgaben *ngIf="currentView === 'inventur-aufgaben'" #inventurComponent>
            </app-inventur-aufgaben>

            <!-- Bestandskontrolle Aufgaben -->
            <app-bestandskontrolle *ngIf="currentView === 'bestandskontrolle-aufgaben'" #bestandskontrolleComponent>
            </app-bestandskontrolle>

            <!-- KDX Bereinigung -->
            <app-kdx-bereinigung *ngIf="currentView === 'kdx-bereinigung'" #kdxComponent [searchTerm]="searchTerm"
                [kdxReserviertFilter]="kdxReserviertFilter">
            </app-kdx-bereinigung>

            <!-- Quickpick Logs -->
            <app-quickpick-logs *ngIf="currentView === 'quickpick-logs'" #quickpickComponent>
            </app-quickpick-logs>
        </div>
    </div>

    <app-fusszeile></app-fusszeile>
</div>
